[meta]
name = "Solarized Dark"
author = "quark"
version = "1.0"

[colors]
background = "#002b36"
foreground = "#839496"
cursor = "#268bd2"
selection_bg = "#073642"
selection_fg = "#93a1a1"
border = "#073642"

[colors.accent]
primary = "#268bd2"
secondary = "#2aa198"
error = "#dc322f"
warning = "#b58900"
success = "#859900"
link = "#268bd2"

[colors.messages]
own = "#859900"
other = "#839496"
system = "#586e75"
timestamp = "#073642"
mention_bg = "#072832"
mention_fg = "#b58900"
reply_border = "#586e75"
thread_indicator = "#2aa198"

[colors.roomlist]
active_bg = "#073642"
active_fg = "#268bd2"
unread = "#93a1a1"
mention_badge = "#dc322f"
muted = "#586e75"

[colors.reactions]
background = "#073642"
border = "#586e75"
own_bg = "#072e28"
count = "#586e75"

[typography]
font_family = "Fira Code, JetBrains Mono, monospace"
font_size = 14
line_height = 1.5
message_spacing = 4

[borders]
style = "single"
room_list_width = "25%"

[emoji]
size = 32
sticker_max_size = 256
reaction_size = 20

[prompt]
symbol = ":>"
normal_indicator = "NOR"
insert_indicator = "INS"
command_indicator = "CMD"
visual_indicator = "VIS"
