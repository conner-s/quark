[meta]
name = "Solarized Light"
author = "quark"
version = "1.0"

[colors]
background = "#fdf6e3"
foreground = "#657b83"
cursor = "#268bd2"
selection_bg = "#eee8d5"
selection_fg = "#586e75"
border = "#d3cdb5"

[colors.accent]
primary = "#268bd2"
secondary = "#2aa198"
error = "#dc322f"
warning = "#b58900"
success = "#859900"
link = "#268bd2"

[colors.messages]
own = "#859900"
other = "#657b83"
system = "#93a1a1"
timestamp = "#b9b2a0"
mention_bg = "#f5f0da"
mention_fg = "#b58900"
reply_border = "#93a1a1"
thread_indicator = "#2aa198"

[colors.roomlist]
active_bg = "#eee8d5"
active_fg = "#268bd2"
unread = "#073642"
mention_badge = "#dc322f"
muted = "#93a1a1"

[colors.reactions]
background = "#eee8d5"
border = "#d3cdb5"
own_bg = "#e8f0d8"
count = "#93a1a1"

[typography]
font_family = "Fira Code, JetBrains Mono, monospace"
font_size = 14
line_height = 1.5
message_spacing = 4

[borders]
style = "single"
room_list_width = "25%"

[emoji]
size = 32
sticker_max_size = 256
reaction_size = 20

[prompt]
symbol = ":>"
normal_indicator = "NOR"
insert_indicator = "INS"
command_indicator = "CMD"
visual_indicator = "VIS"
